<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMIC - ASCII Realtime Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #FFF;
            overflow: auto;
            font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #stripe-bg {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 0;
            pointer-events: none;
            background: repeating-linear-gradient(90deg,
                rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
                transparent 1px, transparent 4px);
        }
        #ascii-canvas {
            width: 1080px; height: 1350px;
            max-width: 100vw; max-height: 100vh;
            object-fit: contain;
            touch-action: none;
            z-index: 1;
            box-shadow: 0 0 40px rgba(0,0,0,0.08);
        }
        #ui-layer {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100; color: #000; text-align: center;
            background: rgba(255,255,255,0.97);
            padding: 40px 50px; border: 2px solid #0000FF;
        }
        #ui-layer h2 { font-size: 1.1em; letter-spacing: 4px; margin-bottom: 8px; }
        #ui-layer p { font-size: 0.7em; opacity: 0.4; margin-bottom: 20px; letter-spacing: 2px; }
        #ui-layer button {
            background: transparent; color: #0000FF;
            border: 2px solid #0000FF; padding: 10px 28px;
            font-family: inherit; font-size: 0.85em; font-weight: 700;
            cursor: pointer; letter-spacing: 2px; transition: all 0.2s; margin: 5px;
        }
        #ui-layer button:hover { background: #0000FF; color: #FFF; }
        #ui-layer input[type="file"] { display: none; }
        #hud {
            position: fixed; bottom: 16px; left: 16px; z-index: 10;
            color: rgba(0,0,0,0.2); font-size: 9px; letter-spacing: 1px;
            pointer-events: none;
        }
        #controls-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10;
        }
        #webcam-toggle, #record-btn {
            background: #FFF; padding: 10px 20px; font-family: inherit; font-size: 11px;
            font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: all 0.3s;
        }
        #webcam-toggle { border: 2px solid #0000FF; color: #0000FF; }
        #webcam-toggle:hover, #webcam-toggle.active { background: #0000FF; color: #FFF; }
        
        #record-btn { border: 2px solid #FF0000; color: #FF0000; }
        #record-btn:hover, #record-btn.active { background: #FF0000; color: #FFF; }
        
        #tutorial-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #000; color: #FFF; padding: 12px 24px; font-family: inherit;
            font-size: 12px; font-weight: 800; letter-spacing: 2px; z-index: 20;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
    </style>
</head>
<body>
    <div id="stripe-bg"></div>
    <canvas id="ascii-canvas"></canvas>
    <div id="ui-layer">
        <h2>WE ARE NOT RAY</h2>
        <p>SELECT VIDEO SOURCE TO BEGIN</p>
        <input type="file" id="videoUpload" accept="video/mp4,video/webm,video/*">
        <button onclick="document.getElementById('videoUpload').click()">SELECT VIDEO</button>
        <button onclick="tryLocalVideo()">USE LOCAL choi insta.mp4</button>
    </div>
    
    <div id="controls-container" style="display:none;">
        <button id="webcam-toggle" onclick="toggleWebcam()">⚡ HAND CONTROL: OFF</button>
        <button id="record-btn" onclick="toggleRecording()">⏺ REC VIDEO</button>
    </div>

    <div id="tutorial-toast">🖱️ SCROLL TO ZOOM GRID</div>
    <div id="hud"><span id="hud-grid"></span> | <span id="hud-fps"></span> | <span id="hud-hand"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.min.js"></script>

    <script>
    // ==========================================================
    // COSMIC ASCII ENGINE v4
    // ==========================================================

    const TEXT_FLOW = 'WE ARE NOT RAY        WE ARE NOT RAY            WE ARE COSMIC           ';
    const MATH_SYMBOLS = ['+', '×', '÷', '=', 'Δ', '○', '↘', '■', '✦', '▚', '░'];

    let CELL_SIZE = 150;
    let targetCellSize = 150;

    let canvas, ctx;
    let video = null;
    let offCanvas, offCtx;
    let cols = 0, rows = 0;
    let isPlaying = false;
    let frameCounter = 0, globalFrame = 0;
    let lastFpsTime = performance.now();
    let fpsDisplay = 0;
    let lastRenderTime = 0;

    // MediaPipe
    let mpHands = null, mpCamera = null;
    let webcamActive = false, webcamVideo = null;
    let pinchDistance = -1;

    // Recording
    let mediaRecorder = null;
    let recordedChunks = [];

    // Intro
    let isIntro = false;
    let introStartTime = 0;
    let hasPlayedIntro = false;

    // ==========================================================
    function init() {
        canvas = document.getElementById('ascii-canvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        document.getElementById('videoUpload').addEventListener('change', (e) => {
            let f = e.target.files[0];
            if (f) {
                document.querySelector('button[onclick="document.getElementById(\'videoUpload\').click()"]').innerText = "LOADING...";
                loadVideo(URL.createObjectURL(f));
            }
        });
    }

    const CANVAS_W = 1080;
    const CANVAS_H = 1350;

    function resizeCanvas() {
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        calcGrid();
    }

    function calcGrid() {
        cols = Math.floor(canvas.width / CELL_SIZE);
        rows = Math.floor(canvas.height / CELL_SIZE);
        if (!offCanvas) {
            offCanvas = document.createElement('canvas');
            offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
        }
        offCanvas.width = cols;
        offCanvas.height = rows;
    }

    function tryLocalVideo() { 
        document.querySelector('button[onclick="tryLocalVideo()"]').innerText = "LOADING...";
        loadVideo('choi_insta.mp4'); 
    }

    function loadVideo(src) {
        if (video) { video.pause(); video.remove(); }
        video = document.createElement('video');
        video.src = typeof src === 'string' ? src : URL.createObjectURL(src);
        video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;

        video.addEventListener('canplay', () => {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('controls-container').style.display = 'flex';
            
            if (!hasPlayedIntro) {
                hasPlayedIntro = true;
                let toast = document.getElementById('tutorial-toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 8000);
                
                isIntro = true;
                introStartTime = performance.now() + 500;
            }

            let playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => { console.warn("Auto-play blocked", err); });
            }
            isPlaying = true;
            requestAnimationFrame(renderLoop);
        });
        video.addEventListener('error', () => {
            alert('Video load failed. Use SELECT VIDEO to choose the file.');
        });
        video.load();
    }

    // ==========================================================
    // RENDER
    // ==========================================================
    function renderLoop() {
        if (!isPlaying) return;
        let now = performance.now();

        // Loop guard: jump back before the video hits black tail frames
        if (video && video.duration > 1.0) {
            if (video.currentTime >= video.duration - 0.3) {
                video.currentTime = 0.1;
            }
        }

        let targetFrameDelay = 16;

        if (isIntro) {
            let elapsed = now - introStartTime;
            const INTRO_LEN = 3000;
            if (elapsed < 0) {
                CELL_SIZE = 150;
                targetFrameDelay = 125; // 8fps
            } else if (elapsed <= INTRO_LEN) {
                let t = elapsed / INTRO_LEN;
                let ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
                CELL_SIZE = 150 + (12 - 150) * ease;
                targetFrameDelay = 125 + (42 - 125) * t; // 8fps → 24fps
            } else {
                isIntro = false;
                targetCellSize = 12;
            }
        } else {
            if (Math.abs(CELL_SIZE - targetCellSize) > 0.1) {
                CELL_SIZE = CELL_SIZE * 0.90 + targetCellSize * 0.10;
            }
        }

        // Frame Throttling
        if (now - lastRenderTime < targetFrameDelay) {
            requestAnimationFrame(renderLoop);
            return;
        }
        lastRenderTime = now;

        // Reset context completely each frame
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.filter = 'none';
        ctx.globalCompositeOperation = 'source-over';

        CELL_SIZE = Math.max(12, Math.min(150, CELL_SIZE));
        calcGrid();

        // Draw video to offscreen — SKIP if video is seeking (prevents black flash)
        if (video && video.readyState >= 2 && !video.seeking) {
            let vR = video.videoWidth / video.videoHeight;
            let cR = cols / rows;
            let dW, dH, dX, dY;
            if (cR > vR) {
                dW = cols; dH = cols / vR; dX = 0; dY = (rows - dH) / 2;
            } else {
                dH = rows; dW = rows * vR; dY = 0; dX = (cols - dW) / 2;
            }
            offCtx.fillStyle = '#FFF';
            offCtx.fillRect(0, 0, cols, rows);
            offCtx.drawImage(video, dX, dY, dW, dH);
        }

        let imageData;
        try { imageData = offCtx.getImageData(0, 0, cols, rows); }
        catch(e) { requestAnimationFrame(renderLoop); return; }
        let pixels = imageData.data;

        // Clear background
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let offsetX = (canvas.width - cols * CELL_SIZE) / 2;
        let offsetY = (canvas.height - rows * CELL_SIZE) / 2;

        let fontSize = Math.max(6, CELL_SIZE);
        ctx.font = `800 ${fontSize}px 'JetBrains Mono', 'Consolas', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Grid-aligned Rhythmic Offset (Wave)
        let glitchCycle = globalFrame % 120;
        let isGlitchActive = glitchCycle < 20;

        for (let j = 0; j < rows; j++) {
            // Calculate Row Shift
            let rowShift = 0;
            if (isGlitchActive) {
                if (j % 4 === 1) rowShift = CELL_SIZE;
                else if (j % 4 === 3) rowShift = -CELL_SIZE;
                
                // Animate snap
                let easeT = Math.sin((glitchCycle / 20) * Math.PI); // 0 -> 1 -> 0
                if (easeT < 0.8) rowShift = 0; // Only pop at the peak
            }

            for (let i = 0; i < cols; i++) {
                let idx = (j * cols + i) * 4;
                let r = pixels[idx], g = pixels[idx+1], b = pixels[idx+2];

                let luma = (0.299 * r + 0.587 * g + 0.114 * b) / 255.0;
                let darkness = 1.0 - luma;

                let x = offsetX + i * CELL_SIZE + rowShift;
                let y = offsetY + j * CELL_SIZE;
                let cx = x + CELL_SIZE / 2;
                let cy = y + CELL_SIZE / 2;
                let vy = cy + CELL_SIZE * 0.045; // Optical vertical center adjustment

                if (darkness < 0.12) continue;

                let v = (darkness - 0.12) / 0.88;
                v = Math.min(1.0, Math.max(0.0, v));
                v = Math.pow(v, 2) * (3.0 - 2.0 * v); // S-curve
                
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = CELL_SIZE >= 30 ? 2 : 1;
                
                // ZONE 1: Highlight -> Cobalt Blue Point Color + Math Symbol
                if (v < 0.15) {
                    ctx.fillStyle = '#0000FF';
                    ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(CELL_SIZE), Math.ceil(CELL_SIZE));
                    
                    // Inject Structural Symbols (20% ratio)
                    if ((i * 11 + j * 17 + Math.floor(globalFrame/5)) % 10 < 2) {
                        ctx.fillStyle = '#FFFFFF';
                        let symIdx = (i * 3 + j * 7 + Math.floor(globalFrame/15)) % MATH_SYMBOLS.length;
                        ctx.fillText(MATH_SYMBOLS[symIdx], cx, vy);
                    }
                } 
                // ZONE 2: Typography
                else if (v < 0.80) {
                    ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                    ctx.fillStyle = '#000000';
                    let rowOffset = Math.floor(j) * 17; 
                    let charIdx = (Math.floor(i) + rowOffset) % TEXT_FLOW.length;
                    ctx.fillText(TEXT_FLOW[charIdx], cx, vy);
                } 
                // ZONE 3: Grey + ASCII
                else if (v < 0.92) {
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(CELL_SIZE), Math.ceil(CELL_SIZE));
                    ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                    ctx.fillStyle = '#000000';
                    let t = (v - 0.80) / 0.12;
                    let block = t < 0.2 ? '.' : t < 0.4 ? ':' : t < 0.6 ? '░' : t < 0.8 ? '▒' : '▓';
                    ctx.fillText(block, cx, vy);
                } 
                // ZONE 4: Deep Shadow
                else {
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(CELL_SIZE), Math.ceil(CELL_SIZE));
                }
            }
        }

        // Post-Processing: Grid-Aligned Glitch Displace
        if (globalFrame % 150 > 135) { 
            let glitchRow = Math.floor((globalFrame * 0.1) % rows);
            let glitchH = CELL_SIZE * 2;
            let glitchY = Math.floor(offsetY + glitchRow * CELL_SIZE);
            let shiftX = (globalFrame % 2 === 0) ? Math.floor(CELL_SIZE * 0.5) : Math.floor(-CELL_SIZE * 0.5);
            
            // Draw a slice shifted on grid bounds
            ctx.drawImage(canvas, 0, glitchY, canvas.width, glitchH, shiftX, glitchY, canvas.width, glitchH);
            
            // RGB Break
            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = 'rgba(0, 0, 255, 0.4)'; // Cobalt Blue
            ctx.fillRect(0, glitchY, canvas.width, glitchH);
            ctx.drawImage(canvas, 0, glitchY, canvas.width, glitchH, shiftX * -0.5, glitchY, canvas.width, glitchH);
            ctx.globalCompositeOperation = 'source-over';
        }

        // FPS
        globalFrame++;
        frameCounter++;
        now = performance.now();
        if (now - lastFpsTime > 500) {
            fpsDisplay = Math.round(frameCounter / ((now - lastFpsTime) / 1000));
            frameCounter = 0;
            lastFpsTime = now;
        }
        document.getElementById('hud-grid').textContent = `GRID ${cols}×${rows} (${Math.round(CELL_SIZE)}px)`;
        document.getElementById('hud-fps').textContent = `${fpsDisplay} FPS`;
        document.getElementById('hud-hand').textContent = pinchDistance >= 0
            ? `PINCH: ${Math.round(pinchDistance)}px` : 'NO HAND';

        requestAnimationFrame(renderLoop);
    }

    // ==========================================================
    // MEDIAPIPE
    // ==========================================================
    function toggleWebcam() {
        let btn = document.getElementById('webcam-toggle');
        if (webcamActive) {
            stopWebcam(); btn.textContent = '⚡ HAND CONTROL: OFF'; btn.classList.remove('active');
        } else {
            startWebcam(); btn.textContent = '⚡ HAND CONTROL: ON'; btn.classList.add('active');
        }
    }
    function startWebcam() {
        webcamActive = true;
        webcamVideo = document.createElement('video');
        webcamVideo.setAttribute('playsinline', '');
        webcamVideo.setAttribute('autoplay', '');
        webcamVideo.setAttribute('muted', '');
        webcamVideo.muted = true;
        webcamVideo.style.display = 'none';
        document.body.appendChild(webcamVideo);
        mpHands = new Hands({
            locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
        });
        mpHands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
        mpHands.onResults(onHandResults);
        mpCamera = new Camera(webcamVideo, {
            onFrame: async () => { if (webcamActive && mpHands) await mpHands.send({ image: webcamVideo }); },
            facingMode: 'user',
            width: 320, height: 240
        });
        mpCamera.start().catch(err => {
            alert('카메라 권한을 허용해주세요! (Camera start failed: ' + err + ')');
            toggleWebcam();
        });
    }
    function stopWebcam() {
        webcamActive = false; pinchDistance = -1; targetCellSize = 150;
        if (mpCamera) { mpCamera.stop(); mpCamera = null; }
        if (webcamVideo) { webcamVideo.srcObject?.getTracks().forEach(t => t.stop()); webcamVideo.remove(); webcamVideo = null; }
    }
    function onHandResults(results) {
        if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) { pinchDistance = -1; return; }
        let lm = results.multiHandLandmarks[0];
        let dx = (lm[4].x - lm[8].x) * 320, dy = (lm[4].y - lm[8].y) * 240;
        pinchDistance = Math.sqrt(dx * dx + dy * dy);
        targetCellSize = Math.round(lerp(12, 150, clamp((pinchDistance - 15) / 140, 0, 1)));
    }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, mn, mx) { return Math.min(mx, Math.max(mn, v)); }

    document.addEventListener('keydown', (e) => {
        if (e.key === '+' || e.key === '=') targetCellSize = Math.min(150, targetCellSize + 5);
        else if (e.key === '-' || e.key === '_') targetCellSize = Math.max(12, targetCellSize - 5);
    });
    
    document.addEventListener('wheel', (e) => {
        document.getElementById('tutorial-toast').style.opacity = '0';
        if (!webcamActive) {
            if (e.deltaY < 0) {
                targetCellSize = Math.min(150, targetCellSize + 5);
            } else if (e.deltaY > 0) {
                targetCellSize = Math.max(12, targetCellSize - 5);
            }
        }
    }, { passive: true });

    // Touch event listeners for mobile gesture mapping
    let initialPinchDist = null;
    let initialCellSize = 0;
    let lastTouchY = null;

    window.addEventListener('touchstart', (e) => {
        if (!webcamActive) {
            if (e.touches.length === 1) {
                lastTouchY = e.touches[0].pageY;
            } else if (e.touches.length === 2) {
                e.preventDefault();
                let dx = e.touches[0].pageX - e.touches[1].pageX;
                let dy = e.touches[0].pageY - e.touches[1].pageY;
                initialPinchDist = Math.hypot(dx, dy);
                initialCellSize = targetCellSize;
            }
        }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
        if (!webcamActive) {
            if (e.touches.length === 1 && lastTouchY !== null) {
                e.preventDefault();
                document.getElementById('tutorial-toast').style.opacity = '0';
                let dy = e.touches[0].pageY - lastTouchY;
                lastTouchY = e.touches[0].pageY;
                targetCellSize = Math.max(12, Math.min(150, targetCellSize + dy * 0.3));
            } 
            else if (e.touches.length === 2 && initialPinchDist !== null) {
                e.preventDefault();
                document.getElementById('tutorial-toast').style.opacity = '0';
                let dx = e.touches[0].pageX - e.touches[1].pageX;
                let dy = e.touches[0].pageY - e.touches[1].pageY;
                let scale = Math.hypot(dx, dy) / initialPinchDist; 
                targetCellSize = Math.max(12, Math.min(150, initialCellSize / scale));
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) initialPinchDist = null;
        if (e.touches.length < 1) lastTouchY = null;
    });

    // ==========================================================
    // RECORDING
    // ==========================================================
    function toggleRecording() {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            startRecording();
        } else {
            stopRecording();
        }
    }

    function startRecording() {
        let stream = canvas.captureStream(60);
        let mimeType = 'video/webm';
        let extension = 'webm';
        
        if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1.424028, mp4a.40.2"')) {
            mimeType = 'video/mp4; codecs="avc1.424028, mp4a.40.2"';
            extension = 'mp4';
        } else if (MediaRecorder.isTypeSupported('video/mp4')) {
            mimeType = 'video/mp4';
            extension = 'mp4';
        } else if (MediaRecorder.isTypeSupported('video/webm; codecs=h264')) {
            mimeType = 'video/webm; codecs=h264';
            extension = 'mp4';
        }

        mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            let blob = new Blob(recordedChunks, { type: mimeType });
            recordedChunks = [];
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a'); 
            a.style.display = 'none'; a.href = url;
            a.download = `cosmic_ascii_${Date.now()}.${extension}`;
            document.body.appendChild(a); a.click();
            setTimeout(() => { window.URL.revokeObjectURL(url); a.remove(); }, 100);
        };
        mediaRecorder.start();
        let btn = document.getElementById('record-btn');
        btn.textContent = '🔴 REC (CLICK TO SAVE)';
        btn.classList.add('active');
    }

    function stopRecording() {
        if(mediaRecorder) mediaRecorder.stop();
        let btn = document.getElementById('record-btn');
        btn.textContent = '⏺ REC VIDEO';
        btn.classList.remove('active');
    }

    window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
